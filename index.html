<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XianBee Premium Dashboard</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap');

        body {
            margin: 0;
            padding: 20px;
            font-family: 'Outfit', sans-serif;
            /* Background Mewah Gradient Dark Blue/Purple */
            background: linear-gradient(135deg, #0f172a 0%, #1e1e38 100%);
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Hero Section (Kartu Profil Klien) */
        .hero-card {
            width: 100%;
            max-width: 400px;
            /* Glassmorphism Effect */
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .hero-card h2 {
            margin: 0 0 5px 0;
            font-weight: 700;
            font-size: 1.5rem;
            background: linear-gradient(90deg, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-card p {
            margin: 0;
            font-size: 0.9rem;
            color: #a0aec0;
            margin-bottom: 15px;
        }

        .badge {
            display: inline-block;
            background: rgba(0, 242, 254, 0.2);
            color: #00f2fe;
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 500;
            border: 1px solid rgba(0, 242, 254, 0.3);
        }

        /* Judul Menu */
        .section-title {
            width: 100%;
            max-width: 400px;
            font-size: 1rem;
            font-weight: 500;
            color: #cbd5e1;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Grid System buat Tombol */
        .menu-grid {
            width: 100%;
            max-width: 400px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        /* Tombol Glassmorphism Mewah */
        .glass-btn {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 20px 10px;
            color: #ffffff;
            font-family: 'Outfit', sans-serif;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .glass-btn:hover, .glass-btn:active {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(79, 172, 254, 0.2);
        }

        .full-width {
            grid-column: span 2;
            flex-direction: row;
            padding: 15px;
            justify-content: center;
            gap: 15px;
            background: linear-gradient(135deg, rgba(79, 172, 254, 0.1), rgba(0, 242, 254, 0.1));
            border-color: rgba(0, 242, 254, 0.3);
        }

        .danger-btn {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }

        .icon {
            font-size: 1.8rem;
        }
        .full-width .icon {
            font-size: 1.4rem;
        }
    </style>
</head>
<body>

    <div class="hero-card">
        <h2>Welcome, <span id="user_name">Guest</span></h2>
        <p>Telegram ID: <span id="user_id">Unknown</span></p>
        <div class="badge">🟢 Secure Connection Established</div>
    </div>

    <div class="section-title">Wallet & Account</div>
    <div class="menu-grid">
        <button class="glass-btn full-width" onclick="sendToBot('menu_profile')">
            <span class="icon">💳</span> View Profile & Balance
        </button>
        <button class="glass-btn" onclick="sendToBot('menu_topup')">
            <span class="icon">💰</span> Deposit
        </button>
        <button class="glass-btn" onclick="sendToBot('menu_referral')">
            <span class="icon">🤝</span> Referral
        </button>
    </div>

    <div class="section-title">Automation Services</div>
    <div class="menu-grid">
        <button class="glass-btn full-width" onclick="sendToBot('menu_akun')">
            <span class="icon">🛒</span> Buy Aged Accounts
        </button>
        <button class="glass-btn" onclick="sendToBot('menu_jasa_followers')">
            <span class="icon">👥</span> Followers
        </button>
        <button class="glass-btn" onclick="sendToBot('menu_jasa_stars')">
            <span class="icon">⭐</span> Stars
        </button>
        <button class="glass-btn" onclick="sendToBot('menu_jasa_forks')">
            <span class="icon">⎇</span> Forks
        </button>
        <button class="glass-btn" onclick="sendToBot('menu_jasa_watch')">
            <span class="icon">👁️</span> Watchers
        </button>
    </div>

    <div class="menu-grid">
        <button class="glass-btn full-width danger-btn" onclick="tg.close()">
            <span class="icon">🛑</span> Close Dashboard
        </button>
    </div>

    <script>
        // Inisialisasi API Telegram WebApp
        let tg = window.Telegram.WebApp;
        tg.expand(); // Paksa layar kebuka penuh
        tg.ready();

        // Nangkep data klien
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            document.getElementById('user_name').innerText = tg.initDataUnsafe.user.first_name;
            document.getElementById('user_id').innerText = tg.initDataUnsafe.user.id;
        }

        // Fungsi ngirim perintah ke Bot
        function sendToBot(actionData) {
            tg.sendData(actionData); 
        }
    </script>
</body>
</html>
