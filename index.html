<html lang="en">
<head>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');

        :root {
            /* Warna Tema Utama (Cyan) */
            --primary: #00f2fe;
            --primary-glow: rgba(0, 242, 254, 0.4);
            
            /* Warna Tema Merah (Secret Mode) */
            --red: #ef4444;
            --red-glow: rgba(239, 68, 68, 0.5);
            
            --blue-dark: #0a0a10;
            --gold: #ffd700;
            --gold-glow: rgba(255, 215, 0, 0.3);
            
            --gray-text: #94a3b8;
            
            /* Pointer Warna Aktif (Diubah lewat JS) */
            --current-primary: #00f2fe;
            --current-glow: rgba(0, 242, 254, 0.4);
        }

        body { 
            margin: 0; padding: 0; 
            font-family: 'Outfit', sans-serif; 
            background-color: #000000; 
            color: #ffffff; 
            min-height: 100vh; overflow-x: hidden; position: relative;
        }

        /* 🟢 PRELOADER BOOT-UP & BIOMETRIC SCANNER */
        #preloader {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #000000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 30px; box-sizing: border-box; transition: opacity 0.8s ease, visibility 0.8s;
        }
        
        /* Animasi Sidik Jari */
        .fingerprint-container {
            width: 100px; height: 100px; margin-bottom: 30px;
            position: relative; opacity: 0; transition: opacity 0.5s ease;
        }
        #fork_icon_svg_biometric {
             fill: none; stroke: var(--current-primary); stroke-width: 2; filter: drop-shadow(0 0 10px var(--current-glow));
        }
        
        /* Garis Laser Scanner */
        .scan-bar {
            position: absolute; top: 0; left: -10px; width: 120px; height: 4px;
            background: linear-gradient(90deg, rgba(0,0,0,0) 0%, var(--current-primary) 50%, rgba(0,0,0,0) 100%);
            border-radius: 10px; box-shadow: 0 0 15px var(--current-primary);
            animation: scan 2s ease-in-out infinite;
        }
        @keyframes scan { 0%, 100% { top: 0%; } 50% { top: 100%; } }

        /* Teks Terminal */
        #term-text {
            font-family: 'Courier New', Courier, monospace; color: var(--current-primary);
            font-size: 0.95rem; line-height: 1.8; text-shadow: 0 0 8px var(--current-glow);
            text-align: left; width: 100%; max-width: 350px;
        }
        .cursor { display: inline-block; width: 10px; height: 1.1rem; background-color: var(--current-primary); animation: blink 1s step-end infinite; vertical-align: middle; margin-left: 5px; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* 🟢 MAIN WRAPPER */
        #main-wrapper {
            opacity: 0; transition: opacity 1.5s ease-in;
            display: flex; flex-direction: column; align-items: center;
            padding: 15px; box-sizing: border-box; width: 100%;
        }

        /* 🟢 CANVAS BACKGROUND - RELAXING CYBER DUST */
        #canvas-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1; opacity: 0.7; 
        }

        /* 🟢 LIVE ACTIVE OPERATORS COUNTER */
        #active-operators {
            position: fixed; top: 15px; right: 15px;
            background: rgba(0, 0, 0, 0.7); border: 1px solid var(--current-glow);
            border-radius: 50px; padding: 5px 15px;
            font-size: 0.75rem; font-weight: 700; color: #ffffff;
            display: flex; align-items: center; gap: 8px; z-index: 100;
            backdrop-filter: blur(5px); transition: border-color 0.5s;
        }
        #op-lamp {
            width: 8px; height: 8px; background-color: #25D366;
            border-radius: 50%; box-shadow: 0 0 10px #25D366;
            animation: lamp-blink 1s ease-in-out infinite;
        }
        @keyframes lamp-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* HEADER LOGO GEDE (TRANSPARAN + SECRET TAP) */
        .header-content { 
            display: flex; justify-content: center; align-items: center;
            margin-bottom: 30px; width: 100%; max-width: 400px;
            background: transparent; border: none; box-shadow: none; 
            padding: 15px; box-sizing: border-box; z-index: 5;
            transform-style: preserve-3d; transform: perspective(1000px);
            cursor: pointer; 
            mix-blend-mode: screen; 
        }
        .store-logo { 
            width: 100%; max-width: 250px; height: auto; object-fit: contain; 
            transform: translateZ(30px); /* 3D pop out */
            filter: drop-shadow(0 0 15px var(--current-glow));
            transition: filter 0.5s;
        }
        
        .section-title { width: 100%; max-width: 400px; font-size: 0.85rem; font-weight: 600; color: #cbd5e1; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; z-index: 1;}
        
        /* GRID & TOMBOL 3D */
        .menu-grid { 
            width: 100%; max-width: 400px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; z-index: 1;
        }
        
        .btn-complex { 
            display: flex; align-items: center; padding: 12px 15px; border-radius: 10px; cursor: pointer; text-align: left; box-sizing: border-box; width: 100%; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(5px); 
            transform-style: preserve-3d; transition: transform 0.1s ease, box-shadow 0.1s ease, border-color 0.5s;
            position: relative;
        }
        /* DYNAMIC MARKET AMBIENT (Glow Napas -JS controlled) */
        .btn-market-ambient {
            animation: market-breathe 4s ease-in-out infinite;
        }
        @keyframes market-breathe {
            0%, 100% { box-shadow: 0 0 5px rgba(255,255,255,0.05); }
            50% { box-shadow: 0 0 15px var(--market-color, rgba(255,255,255,0.1)); }
        }
        
        .btn-icon { font-size: 1.8rem; margin-right: 12px; display: flex; justify-content: center; align-items: center; width: 30px; height: 30px; transform: translateZ(20px); }
        .btn-text { transform: translateZ(10px); }
        
        /* Teks Judul (Bakal kena efek Decrypt) */
        .btn-title { font-size: 0.9rem; font-weight: 700; color: #ffffff; display: block; margin-bottom: 2px; font-family: 'Outfit', sans-serif;}
        .btn-sub { font-size: 0.65rem; color: var(--gray-text); }
        
        /* Warna Tombol & Glow */
        .btn-gold { border-color: rgba(255, 215, 0, 0.4); background: linear-gradient(180deg, rgba(30, 25, 0, 0.8) 0%, rgba(10, 10, 0, 0.95) 100%); }
        .btn-blue { border-color: var(--current-glow); background: linear-gradient(180deg, rgba(0, 20, 40, 0.8) 0%, rgba(0, 5, 15, 0.95) 100%); }
        .btn-red { border-color: rgba(239, 68, 68, 0.4); background: linear-gradient(180deg, rgba(40, 0, 0, 0.8) 0%, rgba(15, 0, 0, 0.95) 100%); justify-content: center; }
        
        .full-width { grid-column: span 2; }

        /* 🟢 CYBERPUNK GLITCH EFFECT ON CLICK */
        .btn-glitch-active {
            animation: glitch-anim 0.25s cubic-bezier(.25, .46, .45, .94) both;
            border-color: var(--red) !important;
            box-shadow: 0 0 15px var(--red), inset 0 0 10px var(--red) !important;
        }
        @keyframes glitch-anim {
            0% { transform: translate(0) scale3d(1.02,1.02,1); filter: hue-rotate(0deg); }
            20% { transform: translate(-4px, 3px); filter: hue-rotate(90deg); }
            40% { transform: translate(-4px, -3px); filter: invert(100%); }
            60% { transform: translate(4px, 3px); filter: hue-rotate(180deg); }
            80% { transform: translate(4px, -3px); filter: hue-rotate(270deg); }
            100% { transform: translate(0) scale3d(1.02,1.02,1); filter: hue-rotate(0deg); }
        }
        
        /* SYS LOAD */
        .sys-load-container { width: 100%; max-width: 400px; background: rgba(0, 195, 255, 0.05); border: 1px solid rgba(0, 195, 255, 0.3); border-radius: 8px; padding: 10px 15px; box-sizing: border-box; display: flex; align-items: center; margin-bottom: 40px; z-index: 1;}
        .progress-bar-bg { flex-grow: 1; height: 8px; background: rgba(255, 255, 255, 0.1); margin: 0 15px; border-radius: 4px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: var(--cyan); width: 15%; transition: width 0.5s ease; box-shadow: 0 0 10px var(--cyan); }

        /* 🟢 WHATSAPP FLOATING BUTTON */
        .wa-fab {
            position: fixed; bottom: 60px; right: 20px;
            width: 55px; height: 55px; background-color: #25D366; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4); z-index: 100;
            text-decoration: none; transition: transform 0.3s ease;
        }
        .wa-fab:active { transform: scale(0.9); }
        .wa-fab img { width: 35px; height: 35px; }

        /* 🟢 SYSTEM FOMO NOTIFICATION */
        #fomo-toast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85); border: 1px solid var(--current-glow);
            border-radius: 50px; padding: 8px 20px; color: var(--cyan);
            font-size: 0.75rem; font-weight: 600; box-shadow: 0 5px 15px var(--current-glow);
            z-index: 1000; transition: top 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55), border-color 0.5s, box-shadow 0.5s;
            white-space: nowrap; display: flex; align-items: center; gap: 8px;
        }
        #fomo-toast.show { top: 20px; }

        /* 🟢 LIVE CRYPTO TICKER */
        .crypto-ticker-container {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: #000000; border-top: 1px solid rgba(0, 242, 254, 0.3);
            color: #ffffff; font-size: 0.75rem; font-family: 'Courier New', Courier, monospace; font-weight: bold;
            padding: 5px 0; z-index: 50; overflow: hidden; display: flex; white-space: nowrap;
        }
        .crypto-ticker { display: inline-block; animation: marquee 30s linear infinite; }
        .crypto-item { margin-right: 30px; }
        .crypto-up { color: #25D366; } .crypto-down { color: #ef4444; }
        @keyframes marquee { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }
        
        /* Fork Icon Svg */
        #fork_icon_svg { width: 28px; height: 28px; fill: none; stroke: #ffffff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;}

        /* 🚨 SECRET ADMIN MODE (Merah) */
        body.secret-mode { background-color: #050000; }
        body.secret-mode canvas { opacity: 0.2; }
        body.secret-mode #canvas-bg { filter: hue-rotate(180deg) brightness(0.5); }
        body.secret-mode .crypto-ticker-container { border-color: rgba(239, 68, 68, 0.3); }

        /* Screen Glitch Overlay untuk Secret Mode Alarm */
        #secret-alarm-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: rgba(239, 68, 68, 0.1); z-index: 9998;
            pointer-events: none; opacity: 0;
            animation: alarm-blink 0.5s ease infinite;
            display: none;
        }
        body.secret-mode #secret-alarm-overlay { display: block; }
        @keyframes alarm-blink { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }

    </style>
</head>

    <script>
        // INISIALISASI WEBAPP
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // AUDIO CONTEXT
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();
        
        // 🟢 FIX: Variabel untuk toggle Admin Mode manual
        let isSecretMode = false;
        let logoTapCount = 0;
        let logoTapTimeout;
        let adminModeTimeout; 

        // FUNGSI SUARA BOOT MESIN
        function playBootSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(100, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.5);
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.05, audioCtx.currentTime + 0.1);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.5);
        }

        // FUNGSI ROBOT NGOMONG (Welcome)
        function speakJarvisWelcome() {
            if (!('speechSynthesis' in window)) return;
            const synth = window.speechSynthesis;
            const text = "Secure Connection Established. Welcome to XianBee Terminal.";
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 1.1; 
            utterance.pitch = 0.8; 
            synth.speak(utterance);
        }

        // FUNGSI BEEP KLIK TOMBOL
        function playSciFiBeep() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.type = 'sine'; 
            oscillator.frequency.setValueAtTime(1400, audioCtx.currentTime); 
            oscillator.frequency.exponentialRampToValueAtTime(700, audioCtx.currentTime + 0.08);
            gainNode.gain.setValueAtTime(0.04, audioCtx.currentTime); 
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
            oscillator.connect(gainNode); gainNode.connect(audioCtx.destination);
            oscillator.start(); oscillator.stop(audioCtx.currentTime + 0.08);
        }
        
        // ALARM SUARA SECRET MODE
        let alarmOsc, alarmGain;
        function startAlarmSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            alarmOsc = audioCtx.createOscillator();
            alarmGain = audioCtx.createGain();
            alarmOsc.type = 'sawtooth';
            alarmOsc.frequency.setValueAtTime(600, audioCtx.currentTime);
            alarmOsc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.25);
            alarmOsc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.5);
            alarmGain.gain.setValueAtTime(0, audioCtx.currentTime);
            alarmGain.gain.linearRampToValueAtTime(0.03, audioCtx.currentTime + 0.1);
            
            alarmOsc.connect(alarmGain); alarmGain.connect(audioCtx.destination);
            alarmOsc.start();
            alarmOsc.loop = true;
            alarmOsc.loopStart = 0; alarmOsc.loopEnd = 0.5;
        }
        function stopAlarmSound() {
            if(alarmOsc) {
                alarmGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                setTimeout(() => { alarmOsc.stop(); }, 150);
            }
        }

        // 🟢 TERMINAL BOOT SEQUENCE & BIOMETRIC
        const bootTexts = [
            "> Executing startup protocol...",
            "> Bypassing network limits...",
            "> Establishing secure link...",
            "> Scanning biometric data...",
            "> Operator Verified.",
            "> Handshake successful.",
            "> ACCESS GRANTED."
        ];
        
        window.onload = () => {
            setTimeout(() => { document.getElementById("biometric-visual").style.opacity = "1"; }, 300);

            let termContainer = document.getElementById("term-text");
            let delay = 0;
            
            bootTexts.forEach((text, i) => {
                setTimeout(() => {
                    termContainer.innerHTML += text + "<br>";
                    if (text.includes("Verified")) {
                        document.getElementById("biometric-visual").style.opacity = "0";
                    }
                    
                    if (i === bootTexts.length - 1) {

        // 🟢 HAPTIC FEEDBACK
        function triggerHapticFeedback() {

        // 🟢 3D TILT EFFECT
        function handleTilt(card, x, y) {
            let rect = card.getBoundingClientRect();
            let centerX = rect.width / 2;
            let centerY = rect.height / 2;
            let rotateX = ((y - centerY) / centerY) * -12; 
            let rotateY = ((x - centerX) / centerX) * 12;
            card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.02, 1.02, 1.02)`;
            card.style.boxShadow = `${-rotateY}px ${rotateX}px 20px rgba(0, 242, 254, 0.2)`;
        }

        document.querySelectorAll('.btn-3d').forEach(card => {
            card.addEventListener('mousemove', e => {
                let rect = card.getBoundingClientRect();
                handleTilt(card, e.clientX - rect.left, e.clientY - rect.top);
            });
            card.addEventListener('touchstart', e => {
                let rect = card.getBoundingClientRect();
                let touch = e.touches[0];
                handleTilt(card, touch.clientX - rect.left, touch.clientY - rect.top);
            });
            card.addEventListener('mouseleave', () => card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`);
            card.addEventListener('touchend', () => card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`);
        });

        // 🟢 HACKER DECRYPTION TEXT EFFECT
        function initHackerDecryption() {
            document.querySelectorAll('.btn-title').forEach(titleElement => {
                const originalText = titleElement.getAttribute('data-text');
                const characters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*';
                let iterations = 0;
                
                const interval = setInterval(() => {
                    titleElement.innerText = originalText.split('').map((char, index) => {
                        if (index < iterations) return originalText[index];
                        return characters.charAt(Math.floor(Math.random() * characters.length));
                    }).join('');
                    
                    if (iterations >= originalText.length) clearInterval(interval);
                    iterations += 1 / 2; 
                }, 30);
            });
        }

        // 🟢 EFEK DEBU MELAYANG (AMBIENT CYBER DUST)
        const canvas = document.getElementById("canvas-bg");
        const ctx = canvas.getContext("2d");
        let width, height, particles;

        function initCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particles = [];
            let particleCount = Math.floor(width / 15); 
            for (let i = 0; i < particleCount; i++) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    vx: (Math.random() - 0.5) * 0.1, 
                    vy: Math.random() * -0.3 - 0.1, 
                    size: Math.random() * 2 + 0.5, 
                    alpha: Math.random() * 0.5 + 0.1 
                });
            }
        }

        function drawParticles() {
            ctx.clearRect(0, 0, width, height);
            for (let i = 0; i < particles.length; i++) {
                let p = particles[i];
                p.x += p.vx; 
                p.y += p.vy;

                if (p.y < 0) { 
                    p.y = height; 
                    p.x = Math.random() * width; 
                }
                if (p.x < 0) p.x = width;
                if (p.x > width) p.x = 0;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = isSecretMode ? `rgba(239, 68, 68, ${p.alpha})` : `rgba(0, 242, 254, ${p.alpha})`; 
                ctx.fill();
            }
            requestAnimationFrame(drawParticles);
        }

        window.addEventListener("resize", initCanvas);
        initCanvas();
        drawParticles();

        function playSciFiBeepCustom(freq) {
             if (audioCtx.state === 'suspended') audioCtx.resume();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.type = 'sine'; 
            oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime); 
            gainNode.gain.setValueAtTime(0.04, audioCtx.currentTime); 
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
            oscillator.connect(gainNode); gainNode.connect(audioCtx.destination);
            oscillator.start(); oscillator.stop(audioCtx.currentTime + 0.1);
        }
        
        function activateSecretAdminMode() {
            if (isSecretMode) return;
