<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XianBee Tech Store Terminal v11</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');

        :root {
            --cyan: #00f2fe;
            --blue-dark: #0a0a10;
            --blue-glow: rgba(0, 242, 254, 0.4);
            --gold: #ffd700;
            --gold-glow: rgba(255, 215, 0, 0.3);
            --red: #ef4444;
            --red-glow: rgba(239, 68, 68, 0.4);
            --gray-text: #94a3b8;
        }

        body { 
            margin: 0; 
            padding: 0; /* Padding dipindah ke main-wrapper */
            font-family: 'Outfit', sans-serif; 
            background-color: var(--blue-dark); 
            color: #ffffff; 
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* 🟢 PRELOADER TERMINAL BOOT-UP */
        #preloader {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #000000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 30px;
            box-sizing: border-box;
            transition: opacity 0.5s ease, visibility 0.5s;
        }
        #term-text {
            font-family: 'Courier New', Courier, monospace;
            color: var(--cyan);
            font-size: 1rem;
            line-height: 1.8;
            text-shadow: 0 0 8px var(--cyan);
        }
        .cursor {
            display: inline-block;
            width: 10px; height: 1.2rem;
            background-color: var(--cyan);
            animation: blink 1s step-end infinite;
            vertical-align: middle;
            margin-left: 5px;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* 🟢 WRAPPER UTAMA (Biar bisa di-fade-in setelah preloader) */
        #main-wrapper {
            opacity: 0; /* Disembunyikan dulu */
            transition: opacity 1s ease-in;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            box-sizing: border-box;
            width: 100%;
        }

        /* 🟢 CANVAS BACKGROUND - MATRIX RAIN */
        #canvas-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1; 
            opacity: 0.4; /* Opacity diturunin biar tombol tetep jelas */
        }

        /* HEADER LOGO GEDE (FULL KOTAK - PNG FIX) */
        .header-content { 
            display: flex; 
            justify-content: center; 
            align-items: center;
            margin-bottom: 25px; 
            width: 100%; 
            max-width: 400px; 
            background: linear-gradient(180deg, rgba(0, 242, 254, 0.05) 0%, rgba(0, 0, 0, 0.5) 100%); 
            border: 1px solid rgba(0, 242, 254, 0.5); 
            border-radius: 15px; 
            padding: 15px; 
            box-shadow: 0 0 25px rgba(0, 242, 254, 0.15), inset 0 0 15px rgba(0, 242, 254, 0.05); 
            box-sizing: border-box;
            z-index: 1;
            /* 3D Property */
            transform-style: preserve-3d;
            transform: perspective(1000px);
        }
        .store-logo { 
            width: 100%; 
            max-width: 250px; 
            height: auto; 
            border-radius: 15px; 
            object-fit: contain; 
            filter: drop-shadow(0 0 15px var(--blue-glow));
            transform: translateZ(20px); /* Efek melayang 3D */
        }
        
        .section-title { width: 100%; max-width: 400px; font-size: 0.85rem; font-weight: 600; color: #cbd5e1; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; z-index: 1; align-self: flex-start; margin-left: auto; margin-right: auto;}
        
        /* GRID & TOMBOL 3D */
        .menu-grid { 
            width: 100%; 
            max-width: 400px; 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
            margin-bottom: 25px; 
            z-index: 1; 
            margin-left: auto; 
            margin-right: auto;
        }
        
        .btn-complex { 
            display: flex; 
            align-items: center; 
            padding: 12px 15px; 
            border-radius: 10px; 
            cursor: pointer; 
            text-align: left; 
            box-sizing: border-box; 
            width: 100%; 
            background: rgba(0,0,0,0.6); 
            border: 1px solid rgba(255,255,255,0.1); 
            backdrop-filter: blur(5px); 
            /* 3D Tilt setup */
            transform-style: preserve-3d;
            transition: transform 0.1s ease, box-shadow 0.1s ease;
            position: relative;
        }
        /* Bikin elemen di dalam tombol melayang di 3D space */
        .btn-icon { font-size: 1.8rem; margin-right: 12px; display: flex; justify-content: center; align-items: center; width: 30px; height: 30px; transform: translateZ(15px); }
        .btn-text { transform: translateZ(10px); }
        
        .btn-title { font-size: 0.85rem; font-weight: 700; color: #ffffff; display: block; }
        .btn-sub { font-size: 0.65rem; color: var(--gray-text); }
        
        .btn-gold { border-color: rgba(255, 215, 0, 0.5); background: linear-gradient(180deg, rgba(30, 25, 0, 0.8) 0%, rgba(10, 10, 0, 0.95) 100%); }
        .btn-blue { border-color: rgba(0, 195, 255, 0.5); background: linear-gradient(180deg, rgba(0, 20, 40, 0.8) 0%, rgba(0, 5, 15, 0.95) 100%); }
        .btn-red { border-color: rgba(239, 68, 68, 0.5); background: linear-gradient(180deg, rgba(40, 0, 0, 0.8) 0%, rgba(15, 0, 0, 0.95) 100%); justify-content: center; }
        
        .full-width { grid-column: span 2; }

        /* 🟢 CYBERPUNK GLITCH EFFECT */
        .btn-glitch {
            animation: glitch-anim 0.3s cubic-bezier(.25, .46, .45, .94) both;
            border-color: var(--red) !important;
            box-shadow: 0 0 10px var(--red), inset 0 0 10px var(--red);
        }
        @keyframes glitch-anim {
            0% { transform: translate(0) scale3d(1,1,1); filter: hue-rotate(0deg); }
            20% { transform: translate(-3px, 2px) scale3d(0.98,0.98,1); filter: hue-rotate(90deg); }
            40% { transform: translate(-3px, -2px) scale3d(1.02,1.02,1); filter: invert(100%); }
            60% { transform: translate(3px, 2px) scale3d(0.95,0.95,1); filter: hue-rotate(180deg); }
            80% { transform: translate(3px, -2px) scale3d(1.05,1.05,1); filter: hue-rotate(270deg); }
            100% { transform: translate(0) scale3d(1,1,1); filter: hue-rotate(0deg); }
        }
        
        /* SYS LOAD */
        .sys-load-container { width: 100%; max-width: 400px; background: rgba(0, 195, 255, 0.05); border: 1px solid rgba(0, 195, 255, 0.3); border-radius: 8px; padding: 10px 15px; box-sizing: border-box; display: flex; align-items: center; margin-bottom: 40px; z-index: 1;}
        .progress-bar-bg { flex-grow: 1; height: 8px; background: rgba(255, 255, 255, 0.1); margin: 0 15px; border-radius: 4px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: var(--cyan); width: 6%; transition: width 0.5s ease; box-shadow: 0 0 10px var(--cyan); }

        /* 🟢 WHATSAPP FLOATING BUTTON */
        .wa-fab {
            position: fixed;
            bottom: 60px; 
            right: 20px;
            width: 55px;
            height: 55px;
            background-color: #25D366;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4);
            z-index: 100;
            text-decoration: none;
            transition: transform 0.3s ease;
        }
        .wa-fab:active { transform: scale(0.9); }
        .wa-fab img { width: 35px; height: 35px; }

        /* 🟢 SYSTEM FOMO NOTIFICATION */
        #fomo-toast {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid rgba(0, 242, 254, 0.5);
            border-radius: 50px;
            padding: 8px 20px;
            color: var(--cyan);
            font-size: 0.75rem;
            font-weight: 600;
            box-shadow: 0 5px 15px rgba(0, 242, 254, 0.2);
            z-index: 1000;
            transition: top 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        #fomo-toast.show { top: 20px; }

        /* 🟢 LIVE CRYPTO TICKER (BOTTOM) */
        .crypto-ticker-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #000000;
            border-top: 1px solid rgba(0, 242, 254, 0.3);
            color: #ffffff;
            font-size: 0.75rem;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            padding: 5px 0;
            z-index: 50;
            overflow: hidden;
            display: flex;
            white-space: nowrap;
        }
        .crypto-ticker {
            display: inline-block;
            animation: marquee 30s linear infinite;
        }
        .crypto-item { margin-right: 30px; }
        .crypto-up { color: #25D366; }
        
        @keyframes marquee {
            0% { transform: translateX(100vw); }
            100% { transform: translateX(-100%); }
        }
        
        #fork_icon_svg {
            width: 28px; height: 28px; fill: none; stroke: #ffffff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
        }
    </style>
</head>

    <script>
        // INISIALISASI WEBAPP
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // AUDIO CONTEXT
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        // 🟢 FUNGSI SUARA BOOT MESIN
        function playBootSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(100, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.5);
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.05, audioCtx.currentTime + 0.1);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.5);
        }

        // 🟢 FUNGSI BEEP KLIK TOMBOL
        function playSciFiBeep() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.type = 'sine'; 
            oscillator.frequency.setValueAtTime(1400, audioCtx.currentTime); 
            oscillator.frequency.exponentialRampToValueAtTime(700, audioCtx.currentTime + 0.08);
            gainNode.gain.setValueAtTime(0.04, audioCtx.currentTime); 
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.08);
        }

        // 🟢 TERMINAL BOOT SEQUENCE
        const bootTexts = [
            "> Executing startup protocol...",
            "> Bypassing GitHub API rate limits...",
            "> Injecting stealth modules...",
            "> Handshake established.",
            "> ACCESS GRANTED."
        ];
        
        window.onload = () => {
            let termContainer = document.getElementById("term-text");
            let delay = 0;
            
            bootTexts.forEach((text, i) => {
                setTimeout(() => {
                    termContainer.innerHTML += text + "<br>";
                    // Kalo udah kalimat terakhir, ilangin preloader dan munculin dashboard
                    if (i === bootTexts.length - 1) {
                        setTimeout(() => {
                            document.getElementById("preloader").style.opacity = "0";
                            setTimeout(() => {
                                document.getElementById("preloader").style.visibility = "hidden";
                                document.getElementById("main-wrapper").style.opacity = "1";
                                playBootSound(); // Bunyi nyala mesin
                            }, 500);
                        }, 800);
                    }
                }, delay);
                delay += 500; // Kecepatan ngetik
            });
        };

        // 🟢 3D TILT EFFECT & GLITCH ON CLICK
        document.querySelectorAll('.btn-3d').forEach(card => {
            // Efek 3D pas kursor/jari gerak
            card.addEventListener('mousemove', e => {
                let rect = card.getBoundingClientRect();
                let x = e.clientX - rect.left;
                let y = e.clientY - rect.top;
                let centerX = rect.width / 2;
                let centerY = rect.height / 2;
                let rotateX = ((y - centerY) / centerY) * -12; // Miring maks 12 derajat
                let rotateY = ((x - centerX) / centerX) * 12;
                card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.02, 1.02, 1.02)`;
                card.style.boxShadow = `${-rotateY}px ${rotateX}px 20px rgba(0, 242, 254, 0.2)`;
            });
            // Reset balik lurus pas dilepas
            card.addEventListener('mouseleave', () => {
                card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
                card.style.boxShadow = `none`;
            });
        });

        // 🟢 FUNGSI SEND DATA + EFEK GLITCH
        function sendToBot(element, actionData) {
            playSciFiBeep();
            
            // Trigger efek kesemutan/glitch
            element.classList.add('btn-glitch');
            
            // Tunggu 300ms biar klien ngerasain efeknya, baru kirim perintah
            setTimeout(() => {
                element.classList.remove('btn-glitch');
                if(actionData === "close_terminal") {
                    tg.close();
                } else {
                    tg.sendData(actionData);
                }
            }, 300);
        }

        // Animasi Sys Load
        let currentLoad = 15;
        document.getElementById('sys_load_bar').style.width = currentLoad + '%';
        document.getElementById('sys_load_txt').innerText = currentLoad + '%';
        
        setInterval(() => {
            let load = Math.floor(Math.random() * 10) + 10; 
            document.getElementById('sys_load_bar').style.width = load + '%';
            document.getElementById('sys_load_txt').innerText = load + '%';
        }, 5000);

        // 🟢 SYSTEM FOMO NOTIFICATION

            "🚀 Fork Injection initiated for @Dev***",
            "🛒 Client @Mar*** purchased 2018 Aged Account",
            "🔶 Incoming transfer: Binance Pay ID 8487***",
            "👥 Client @Zoe*** injected 500 Followers"
        ];
        setInterval(() => {
            const toast = document.getElementById('fomo-toast');

            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 3500);

        // 🟢 LIVE CRYPTO TICKER
        async function fetchCryptoPrices() {
            try {
                const symbols = ["BTCUSDT","ETHUSDT","SOLUSDT","BNBUSDT"];
                const res = await fetch(`https://api.binance.com/api/v3/ticker/price`);

                document.getElementById('ticker-content').innerHTML = tickerHtml + tickerHtml; 
            } catch (error) {
                document.getElementById('ticker-content').innerHTML = "Market Intelligence Offline | Check Secure Connection.";

        fetchCryptoPrices();

        // 🟢 MATRIX RAIN EFFECT (Hacker Background)
        const canvas = document.getElementById("canvas-bg");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*アイウエオカキクケコサシスセソ";
        const fontSize = 14;
        const columns = canvas.width / fontSize;
        
        // Array buat nyimpen posisi jatuhnya tiap kolom
        const drops = [];
        for(let x = 0; x < columns; x++) {
            drops[x] = 1;
        }
        
        function drawMatrix() {
            // Fill background pake item transparan biar ada efek buntut (trail)
            ctx.fillStyle = "rgba(10, 10, 16, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Warna teks matrix cyan/neon
            ctx.fillStyle = "#00f2fe"; 
            ctx.font = fontSize + "px monospace";
            
            for(let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                // Cetak huruf
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                
                // Kalo udah nyampe bawah layar, reset ke atas secara random
                if(drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
            requestAnimationFrame(drawMatrix);
        }
        drawMatrix();
        
        window.addEventListener("resize", () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

    </script>
</body>
</html>
